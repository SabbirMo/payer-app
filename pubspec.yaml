name: global_daily_devotional
description: Global Daily Devotional - Christian Community App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.1.0
  shared_preferences: ^2.2.2
  url_launcher: ^6.2.4
  flutter_local_notifications: ^21.0.0
  provider: ^6.1.1
  intl: ^0.19.0
  share_plus: ^7.2.1
  workmanager: ^0.9.0
  timezone: ^0.11.0
  flutter_timezone: ^5.0.1
  gal: ^2.1.0
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/images/logo.jpg"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/json/bible.json
    - assets/wallpapers/
